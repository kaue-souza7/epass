{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for categoria, mensagem in messages %}
            <div class="alert {{categoria}}">
                {{ mensagem }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}


<script>
    setTimeout(() => {
    document.querySelectorAll('.alert').forEach(el => {
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 300);
    });
}, 3000);
</script>
